# render.yaml — deploy backend on Render
services:
  - type: web
    name: hrms-lite-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
    rootDir: backend

databases:
  - name: hrms-lite-db
    plan: free
    databaseName: hrms
    user: hrms_user
